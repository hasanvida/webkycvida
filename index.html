<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>VIDA eKYC Demo</title>

  <script src="https://web-sdk.vida.id/1.1.0/sandbox/vida-web-sdk.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f5f9;
    }

    .layout {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-secondary { background: #111827; color: #fff; }
    .btn-tertiary { background: #059669; color: #fff; }

    .toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    #sdk-container {
      height: 520px;
      display: none;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    pre {
      background: #0b1220;
      color: #e5e7eb;
      padding: 12px;
      border-radius: 10px;
      font-size: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="layout">

  <!-- LEFT -->
  <div class="card">
    <h2>Country</h2>
    <div class="toggle">
      <button id="btn-id" class="btn-primary" onclick="setCountry('ID')">
        Indonesia 🇮🇩
      </button>
      <button id="btn-my" class="btn-secondary" onclick="setCountry('MY')">
        Malaysia 🇲🇾
      </button>
    </div>

    <h2>Verification</h2>
    <button class="btn-primary" onclick="startDocumentOnly()">Document Only</button>
    <button class="btn-secondary" onclick="startFullVerification()">Full Verification</button>
    <button class="btn-tertiary" onclick="startLivenessOnly()">Liveness Only</button>
  </div>

  <!-- RIGHT -->
  <div class="card">
    <h2>Result</h2>
    <pre id="result"></pre>
    <div id="sdk-container"></div>
  </div>

</div>

<script>
  let selectedCountry = "ID";

  const btnId = document.getElementById("btn-id");
  const btnMy = document.getElementById("btn-my");
  const result = document.getElementById("result");
  const sdkContainer = document.getElementById("sdk-container");

  function setCountry(country) {
    selectedCountry = country;

    btnId.className = country === "ID" ? "btn-primary" : "btn-secondary";
    btnMy.className = country === "MY" ? "btn-primary" : "btn-secondary";
  }

  async function fetchToken() {
    const res = await fetch("/.netlify/functions/get-token");
    return res.json();
  }

  function showResult(data) {
    result.textContent = JSON.stringify(data, null, 2);
  }

  function identityConfig(isFull) {
    if (selectedCountry === "MY") {
      return {
        countryCode: "MYS",
        workflowConfigs: {
          identityVerification: {
            userConsent: { obtained: true, obtainedAt: Date.now() },

            // ❌ Driving License REMOVED
            documentType: ["MyKad", "MyPR", "MyTentera", "PASSPORT"],

            docVerification: {
              skipDocSelectionScreen: false,
              skipIntroductionScreen: false
            },

            ...(isFull ? { faceMatch: {} } : { skipFaceMatch: true })
          }
        }
      };
    }

    // 🇮🇩 Indonesia (default)
    return {
      countryCode: "IDN",
      workflowConfigs: {
        identityVerification: {
          userConsent: { obtained: true, obtainedAt: Date.now() },
          docVerification: {
            skipDocSelectionScreen: false,
            skipIntroductionScreen: false
          },
          ...(isFull ? { faceMatch: {} } : { skipFaceMatch: true })
        }
      }
    };
  }

  async function startDocumentOnly() {
    result.textContent = "";
    const t = await fetchToken();

    VidaSDK.init({
      token: t.access_token,
      signingKey: t.signing_key,
      workflow: "identity-verification",
      locale: "EN",
      ...identityConfig(false),
      onComplete: showResult,
      onError: showResult
    });
  }

  async function startFullVerification() {
    result.textContent = "";
    const t = await fetchToken();

    VidaSDK.init({
      token: t.access_token,
      signingKey: t.signing_key,
      workflow: "identity-verification",
      locale: "EN",
      ...identityConfig(true),
      onComplete: showResult,
      onError: showResult
    });
  }

  async function startLivenessOnly() {
    result.textContent = "";
    const t = await fetchToken();
    sdkContainer.style.display = "block";

    VidaSDK.init({
      token: t.access_token,
      signingKey: t.signing_key,
      workflow: "liveness",
      elementId: "sdk-container",
      locale: "EN",
      onComplete: showResult,
      onError: showResult
    });
  }
</script>

</body>
</html>
