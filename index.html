<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>VIDA eKYC Verification Demo</title>

<script src="https://web-sdk.vida.id/1.1.0/sandbox/vida-web-sdk.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family: "Inter","Segoe UI", Arial, sans-serif;
background:#f5f7fb;
color:#1f2937;
}

header{
background:#0f172a;
color:white;
padding:18px 28px;
font-size:18px;
font-weight:600;
letter-spacing:.3px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.layout{
display:grid;
grid-template-columns:340px 1fr;
gap:24px;
}

.card{
background:white;
border-radius:14px;
padding:24px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

.section-title{
font-size:14px;
font-weight:600;
margin-bottom:12px;
color:#6b7280;
text-transform:uppercase;
letter-spacing:.5px;
}

.country-toggle{
display:flex;
gap:10px;
margin-bottom:24px;
}

button{
border:none;
border-radius:10px;
padding:13px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:all .2s;
width:100%;
}

button:hover{
transform:translateY(-1px);
}

.btn-primary{
background:#2563eb;
color:white;
}

.btn-secondary{
background:#111827;
color:white;
}

.btn-tertiary{
background:#059669;
color:white;
}

.btn-outline{
background:#f3f4f6;
}

.verify-buttons button{
margin-bottom:12px;
}

.result-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.badge{
background:#e5e7eb;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

pre{
background:#0b1220;
color:#d1d5db;
padding:16px;
border-radius:10px;
font-size:12px;
overflow:auto;
height:200px;
}

#sdk-container{
margin-top:16px;
height:520px;
border-radius:12px;
overflow:hidden;
border:1px solid #e5e7eb;
display:none;
}

.footer{
margin-top:20px;
font-size:12px;
color:#9ca3af;
text-align:center;
}

@media(max-width:900px){

.layout{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>
VIDA eKYC Web SDK Demo
</header>

<div class="container">

<div class="layout">

<!-- LEFT PANEL -->
<div class="card">

<div class="section-title">Country</div>

<div class="country-toggle">
<button id="btn-id" class="btn-primary" onclick="setCountry('ID')">
Indonesia 🇮🇩
</button>

<button id="btn-my" class="btn-outline" onclick="setCountry('MY')">
Malaysia 🇲🇾
</button>
</div>


<div class="section-title">Verification Type</div>

<div class="verify-buttons">

<button class="btn-primary" onclick="startDocumentOnly()">
Document Verification
</button>

<button class="btn-secondary" onclick="startFullVerification()">
Full eKYC (Document + Face Match)
</button>

<button class="btn-tertiary" onclick="startLivenessOnly()">
Liveness Only
</button>

</div>

</div>


<!-- RIGHT PANEL -->
<div class="card">

<div class="result-header">
<h3>Verification Result</h3>
<div class="badge" id="statusBadge">Idle</div>
</div>

<pre id="result"></pre>

<div id="sdk-container"></div>

</div>

</div>

<div class="footer">
VIDA Identity Verification Sandbox Demo
</div>

</div>

<script>

let selectedCountry = "ID";

const btnId = document.getElementById("btn-id");
const btnMy = document.getElementById("btn-my");
const result = document.getElementById("result");
const sdkContainer = document.getElementById("sdk-container");
const statusBadge = document.getElementById("statusBadge");

function setCountry(country){

selectedCountry = country;

btnId.className = country === "ID" ? "btn-primary" : "btn-outline";
btnMy.className = country === "MY" ? "btn-primary" : "btn-outline";

}

async function fetchToken(){

statusBadge.textContent="Fetching Token";

const res = await fetch("/.netlify/functions/get-token");
return res.json();

}

function showResult(data){

statusBadge.textContent="Completed";

result.textContent = JSON.stringify(data,null,2);

}

function identityConfig(isFull){

if(selectedCountry==="MY"){

return{

countryCode:"MYS",

workflowConfigs:{
identityVerification:{
userConsent:{obtained:true,obtainedAt:Date.now()},

documentType:["MyKad","MyPR","MyTentera","PASSPORT"],

docVerification:{
skipDocSelectionScreen:false,
skipIntroductionScreen:false
},

...(isFull?{faceMatch:{}}:{skipFaceMatch:true})

}
}

};

}

return{

countryCode:"IDN",

workflowConfigs:{
identityVerification:{
userConsent:{obtained:true,obtainedAt:Date.now()},

docVerification:{
skipDocSelectionScreen:false,
skipIntroductionScreen:false
},

...(isFull?{faceMatch:{}}:{skipFaceMatch:true})

}
}

};

}

async function startDocumentOnly(){

result.textContent="";
statusBadge.textContent="Starting";

const t = await fetchToken();

VidaSDK.init({

token:t.access_token,
signingKey:t.signing_key,

workflow:"identity-verification",
locale:"EN",

...identityConfig(false),

onComplete:showResult,
onError:showResult

});

}

async function startFullVerification(){

result.textContent="";
statusBadge.textContent="Starting";

const t = await fetchToken();

VidaSDK.init({

token:t.access_token,
signingKey:t.signing_key,

workflow:"identity-verification",
locale:"EN",

...identityConfig(true),

onComplete:showResult,
onError:showResult

});

}

async function startLivenessOnly(){

result.textContent="";
statusBadge.textContent="Starting";

const t = await fetchToken();

sdkContainer.style.display="block";

VidaSDK.init({

token:t.access_token,
signingKey:t.signing_key,

workflow:"liveness",
elementId:"sdk-container",
locale:"EN",

onComplete:showResult,
onError:showResult

});

}

</script>

</body>
</html>
